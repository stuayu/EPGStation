name: Docker

on:
  push:
    branches: [main, master]
    tags: ['*']

env:
  MAIN_DISTRO: debian

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        distro: [alpine, debian]
        platforms: [linux/amd64,linux/arm64]
    steps:
      - uses: actions/checkout@v4
      - name: Set image tags
        id: docker-tags
        shell: bash
        run: |
          IMAGE="${{ secrets.DOCKERHUB_IMAGE }}"
          if [[ "$GITHUB_REF" == refs/heads/* ]]; then
            VERSION="${GITHUB_REF#refs/heads/}"
            TAGS="$IMAGE:$VERSION-${{ matrix.distro }}"
            if [[ "$MAIN_DISTRO" == "${{ matrix.distro }}" ]]; then TAGS="$TAGS,$IMAGE:$VERSION"; fi
          else
            VERSION="${GITHUB_REF#refs/tags/}"
            TAGS="$IMAGE:$VERSION-${{ matrix.distro }},$IMAGE:${{ matrix.distro }}"
            if [[ "$MAIN_DISTRO" == "${{ matrix.distro }}" ]]; then TAGS="$TAGS,$IMAGE:$VERSION,$IMAGE:latest"; fi
          fi
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.${{ matrix.distro }}
          platforms: ${{ matrix.platforms }}
          tags: ${{ steps.docker-tags.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.distro }}
          cache-to: type=gha,mode=max,scope=${{ matrix.distro }}
          push: true
